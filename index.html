<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Live and recent Dota 2 pro match scores, drafts and scoreboards." />
    <meta name="theme-color" content="#0a0b0e" />
    <title>SpotDota · Dota 2 match tracker</title>
    <script>
      // Apply the saved theme before paint to avoid a flash. Dark is the
      // default; only an explicit 'light' choice opts out.
      (function () {
        try {
          if (localStorage.getItem('theme') !== 'light') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
